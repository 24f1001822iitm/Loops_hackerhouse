<section id="nav">
  <style>
    #nav {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      width: 100%;
      background: var(--bg);
      border-bottom: 1px solid var(--rule);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    #nav.is-scrolled {
      background: rgba(247, 243, 234, 0.88);
      -webkit-backdrop-filter: saturate(1.2) blur(8px);
      backdrop-filter: saturate(1.2) blur(8px);
      border-bottom-color: rgba(26, 24, 21, 0.22);
    }
    #nav .nav-inner {
      max-width: var(--container-max);
      margin: 0 auto;
      padding: 0 var(--gutter);
      height: 68px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 24px;
    }
    #nav .wordmark {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      text-decoration: none;
      color: var(--ink);
      line-height: 1;
      gap: 4px;
    }
    #nav .wordmark-name {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 20px;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    #nav .wordmark-meta {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #nav .nav-links {
      display: flex;
      align-items: center;
      gap: 28px;
      justify-content: center;
    }
    #nav .nav-links a {
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--ink-soft);
      text-decoration: none;
      letter-spacing: 0;
      transition: color 0.15s ease;
    }
    #nav .nav-links a:hover {
      color: var(--ink);
    }
    #nav .nav-cta-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
    }
    #nav .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      color: #fdfaf2;
      background: var(--accent);
      padding: 10px 16px;
      border-radius: 2px;
      text-decoration: none;
      border: 1px solid var(--accent);
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    #nav .nav-cta:hover {
      background: #751f1f;
      border-color: #751f1f;
    }
    #nav .nav-cta .arrow {
      display: inline-block;
      transition: transform 0.15s ease;
    }
    #nav .nav-cta:hover .arrow {
      transform: translateX(2px);
    }
    #nav .nav-menu-btn {
      display: none;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 8px 10px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    #nav .nav-menu-btn:hover {
      color: var(--ink);
      border-color: rgba(26, 24, 21, 0.3);
    }
    #nav .nav-dropdown {
      display: none;
      position: absolute;
      top: 68px;
      left: 0;
      right: 0;
      background: rgba(247, 243, 234, 0.96);
      -webkit-backdrop-filter: saturate(1.2) blur(8px);
      backdrop-filter: saturate(1.2) blur(8px);
      border-bottom: 1px solid var(--rule);
      padding: 12px var(--gutter) 20px;
      flex-direction: column;
      gap: 2px;
    }
    #nav .nav-dropdown.is-open {
      display: flex;
    }
    #nav .nav-dropdown a {
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 10px 0;
      border-bottom: 1px solid var(--rule);
    }
    #nav .nav-dropdown a:last-child {
      border-bottom: none;
    }
    @media (max-width: 720px) {
      #nav .nav-inner {
        grid-template-columns: 1fr auto auto;
        gap: 12px;
      }
      #nav .nav-links {
        display: none;
      }
      #nav .nav-menu-btn {
        display: inline-flex;
      }
      #nav .nav-cta {
        padding: 9px 12px;
        font-size: 0.875rem;
      }
      #nav .wordmark-meta {
        font-size: 9px;
      }
    }
    @media (max-width: 420px) {
      #nav .nav-cta span.label {
        display: none;
      }
      #nav .nav-cta::before {
        content: "Hear Alex";
      }
    }
  </style>

  <nav class="nav-inner" aria-label="Primary">
    <a href="#hero" class="wordmark" aria-label="ClaimsBot home">
      <span class="wordmark-name">ClaimsBot</span>
      <span class="wordmark-meta">SafeGuard Insurance &middot; Apr 2026</span>
    </a>

    <div class="nav-links" role="navigation">
      <a href="#tools">How it works</a>
      <a href="#transcript">A call</a>
      <a href="#policyholders">For you</a>
      <a href="#insurers">For insurers</a>
      <a href="#faq">FAQ</a>
    </div>

    <div class="nav-cta-wrap">
      <button class="nav-menu-btn" type="button" aria-expanded="false" aria-controls="nav-dropdown-menu">Menu</button>
      <a href="#hero" class="nav-cta">
        <span class="label">Hear Alex</span>
        <span class="arrow" aria-hidden="true">&rarr;</span>
      </a>
    </div>
  </nav>

  <div class="nav-dropdown" id="nav-dropdown-menu" role="menu">
    <a href="#tools" role="menuitem">How it works</a>
    <a href="#transcript" role="menuitem">A call</a>
    <a href="#policyholders" role="menuitem">For you</a>
    <a href="#insurers" role="menuitem">For insurers</a>
    <a href="#faq" role="menuitem">FAQ</a>
  </div>

  <script>
    (function () {
      var nav = document.getElementById('nav');
      if (!nav) return;

      var onScroll = function () {
        if (window.scrollY > 4) {
          nav.classList.add('is-scrolled');
        } else {
          nav.classList.remove('is-scrolled');
        }
      };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();

      var btn = nav.querySelector('.nav-menu-btn');
      var dropdown = nav.querySelector('.nav-dropdown');
      if (btn && dropdown) {
        btn.addEventListener('click', function () {
          var open = dropdown.classList.toggle('is-open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
        dropdown.querySelectorAll('a').forEach(function (link) {
          link.addEventListener('click', function () {
            dropdown.classList.remove('is-open');
            btn.setAttribute('aria-expanded', 'false');
          });
        });
      }
    })();
  </script>
</section>
